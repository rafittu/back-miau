# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: BACK-MIAU CI - Continuous Integration

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main', 'develop']

jobs:
  pre-merge:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: |
          export PORT=$APP_PORT
          export DATABASE_URL=$DATABASE_URL_SECRET
          export POSTGRES_DB=$POSTGRES_DB_SECRET
          export POSTGRES_USER=$POSTGRES_USER_SECRET
          export POSTGRES_PASSWORD=$POSTGRES_PASSWORD_SECRET
          export POSTGRES_HOST_CONTAINER=$POSTGRES_HOST_PORT
          npm test

        env:
          APP_PORT: ${{ secrets.APP_PORT }}
          DATABASE_URL_SECRET: ${{ secrets.DATABASE_URL }}
          POSTGRES_DB_SECRET: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER_SECRET: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD_SECRET: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST_PORT: ${{ secrets.POSTGRES_HOST_CONTAINER }}

      - name: Code review
        run: npx eslint .
